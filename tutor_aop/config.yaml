tutor_server:
  base_url: "http://localhost:8000/v1"
  model: "Qwen/Qwen2.5-7B-Instruct"
  api_key: "EMPTY"

student_server:
  base_url: "http://localhost:8001/v1"
  model: "meta-llama/Llama-3.1-8B-Instruct"
  api_key: "EMPTY"

experiment:
  dataset: "HuggingFaceH4/MATH-500"
  num_problems: 500
  start_index: 0
  max_turns: 5
  max_replan: 1
  max_revision: 1
  temperature: 0.0
  max_tokens: 1024
  request_timeout: 120
  retry: 5

retrieval:
  pool_path: "rag_pool/proofwiki_examples.jsonl"
  top_k: 3
  enabled: true

logging:
  log_dir: "logs"
  log_filename: "episodes.jsonl"

mock:
  enabled: false
